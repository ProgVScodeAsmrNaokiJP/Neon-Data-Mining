<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEON DATA MINING — アカウント作成</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Share+Tech+Mono&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:radial-gradient(circle at 50% 0%,#0a0a1f,#03030a 70%);color:#cfe;font-family:'Share Tech Mono',monospace;min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:28px 16px}
  .wrap{width:min(480px,96vw)}
  h1{font-family:'Orbitron',monospace;font-size:20px;letter-spacing:.12em;color:#00f0ff;text-shadow:0 0 18px rgba(0,240,255,.5);margin-bottom:4px}
  .sub{font-size:12px;color:rgba(255,255,255,.45);margin-bottom:22px}
  label{display:block;font-size:12px;color:#bf9fff;margin:14px 0 5px;letter-spacing:.05em}
  .req{color:#ff2d9b}
  input,select{width:100%;padding:11px;background:#0c0c18;border:1px solid rgba(255,255,255,.22);color:#fff;border-radius:5px;font-family:inherit;font-size:14px}
  input:focus,select:focus{outline:none;border-color:#00f0ff;box-shadow:0 0 0 2px rgba(0,240,255,.18)}
  .hint{font-size:10px;color:rgba(255,255,255,.35);margin-top:4px}
  .err{color:#ff2d9b;font-size:12px;min-height:18px;margin:10px 0}
  button{width:100%;padding:14px;margin-top:18px;background:rgba(0,240,255,.1);border:1px solid #00f0ff;color:#00f0ff;border-radius:5px;cursor:pointer;font-family:'Orbitron',monospace;letter-spacing:.1em;font-size:14px;transition:all .2s}
  button:hover{background:rgba(0,240,255,.22)}
  .card{background:#070712;border:1px solid rgba(0,240,255,.3);border-radius:10px;padding:24px}
  .ok{display:none;text-align:center;animation:fade .4s}
  @keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1}}
  .idbox{font-family:'Orbitron',monospace;font-size:34px;letter-spacing:.22em;color:#39ff14;text-shadow:0 0 20px rgba(57,255,20,.5);margin:14px 0;word-break:break-all}
  .note{font-size:11px;color:rgba(255,255,255,.4);line-height:1.7;margin-top:14px}
  .b2{background:rgba(191,95,255,.1);border-color:#bf5fff;color:#bf5fff}
  .b2:hover{background:rgba(191,95,255,.22)}
</style>
</head>
<body>
<div class="wrap">
  <h1>◈ ACCOUNT CREATE</h1>
  <div class="sub">NEON DATA MINING — アカウント作成。発行された8桁IDで、同名申請やランキング登録がスムーズになります。</div>

  <div class="card" id="form-card">
    <label>メールアドレス <span class="req">*</span></label>
    <input id="ac-email" type="email" placeholder="you@example.com" maxlength="120">
    <div class="hint">連絡・本人確認用（悪用しません）</div>

    <label>国籍 <span class="req">*</span></label>
    <select id="ac-nat"><option value="">— 選択してください —</option></select>

    <label>都道府県・州 / 地域 <span class="req">*</span></label>
    <select id="ac-region-sel" style="display:none"><option value="">— 選択 —</option></select>
    <input id="ac-region-txt" placeholder="例: 静岡県沼津市" maxlength="60" style="display:none">
    <div class="hint">国籍を選ぶと、その国に合わせた選択肢が出ます</div>

    <label>希望プレイヤー名 <span class="req">*</span></label>
    <input id="ac-name" maxlength="25" placeholder="最大25文字（大小文字・空白・基本記号OK）">
    <div class="hint">類似名OK。完全に同じ名前が既にある場合のみ管理者の判断になります</div>

    <div class="err" id="ac-err"></div>
    <button onclick="createAccount()">⚡ アカウントを作成</button>
  </div>

  <div class="card ok" id="ok-card">
    <div style="font-family:'Orbitron',monospace;color:#39ff14;letter-spacing:.1em">✅ ACCOUNT CREATED</div>
    <div style="font-size:12px;color:rgba(255,255,255,.5);margin-top:10px">あなたのプレイヤーID</div>
    <div class="idbox" id="ok-id">00000000</div>
    <div id="ok-detail" style="font-size:12px;color:rgba(255,255,255,.6);line-height:1.8"></div>
    <button class="b2" onclick="mailRegister()">📧 このIDで管理者に登録申請メールを作成</button>
    <button onclick="location.reload()">別のアカウントを作成</button>
    <div class="note">
      ※ このIDはこの端末に保存されました（ゲームの同名申請で自動入力に使えます）。<br>
      ※ 公式な本登録・ID重複の最終確認はサーバー側で行われます（管理者が承認）。
    </div>
  </div>
</div>

<script>
// 国籍 → 地域データ（日本47都道府県・米50州は実データ。その他は自由入力）
const PREFS_JP=['北海道','青森県','岩手県','宮城県','秋田県','山形県','福島県','茨城県','栃木県','群馬県','埼玉県','千葉県','東京都','神奈川県','新潟県','富山県','石川県','福井県','山梨県','長野県','岐阜県','静岡県','愛知県','三重県','滋賀県','京都府','大阪府','兵庫県','奈良県','和歌山県','鳥取県','島根県','岡山県','広島県','山口県','徳島県','香川県','愛媛県','高知県','福岡県','佐賀県','長崎県','熊本県','大分県','宮崎県','鹿児島県','沖縄県'];
const STATES_US=['Alabama','Alaska','Arizona','Arkansas','California','Colorado','Connecticut','Delaware','Florida','Georgia','Hawaii','Idaho','Illinois','Indiana','Iowa','Kansas','Kentucky','Louisiana','Maine','Maryland','Massachusetts','Michigan','Minnesota','Mississippi','Missouri','Montana','Nebraska','Nevada','New Hampshire','New Jersey','New Mexico','New York','North Carolina','North Dakota','Ohio','Oklahoma','Oregon','Pennsylvania','Rhode Island','South Carolina','South Dakota','Tennessee','Texas','Utah','Vermont','Virginia','Washington','West Virginia','Wisconsin','Wyoming'];
const REGIONS_GB=['England','Scotland','Wales','Northern Ireland'];
const REGIONS_KR=['ソウル特別市','釜山広域市','大邱広域市','仁川広域市','光州広域市','大田広域市','蔚山広域市','京畿道','江原道','忠清北道','忠清南道','全羅北道','全羅南道','慶尚北道','慶尚南道','済州道'];
const NATIONS=[
  {code:'JP',flag:'🇯🇵',name:'日本',regions:PREFS_JP},
  {code:'US',flag:'🇺🇸',name:'アメリカ',regions:STATES_US},
  {code:'GB',flag:'🇬🇧',name:'イギリス',regions:REGIONS_GB},
  {code:'KR',flag:'🇰🇷',name:'韓国',regions:REGIONS_KR},
  {code:'CN',flag:'🇨🇳',name:'中国',regions:null},
  {code:'TW',flag:'🇹🇼',name:'台湾',regions:null},
  {code:'DE',flag:'🇩🇪',name:'ドイツ',regions:null},
  {code:'FR',flag:'🇫🇷',name:'フランス',regions:null},
  {code:'BR',flag:'🇧🇷',name:'ブラジル',regions:null},
  {code:'OT',flag:'🌐',name:'その他',regions:null},
];
const natSel=document.getElementById('ac-nat');
NATIONS.forEach(function(n){ const o=document.createElement('option');o.value=n.code;o.textContent=n.flag+' '+n.name;natSel.appendChild(o); });
const regSel=document.getElementById('ac-region-sel'), regTxt=document.getElementById('ac-region-txt');
natSel.addEventListener('change',function(){
  const n=NATIONS.find(x=>x.code===natSel.value);
  if(n&&n.regions){
    regSel.innerHTML='<option value="">— 選択 —</option>'+n.regions.map(r=>'<option>'+r+'</option>').join('');
    regSel.style.display='';regTxt.style.display='none';regTxt.value='';
  } else {
    regSel.style.display='none';regTxt.style.display='';regSel.value='';
  }
});
function regionValue(){ return regSel.style.display!=='none' ? regSel.value.trim() : regTxt.value.trim(); }
function gen8(){ let s=''; for(let i=0;i<8;i++)s+=Math.floor(Math.random()*10); return s; }
function getAdminEmail(){ try{return localStorage.getItem('ndm_admin_email')||'admin@example.com';}catch(e){return 'admin@example.com';} }

let _acct=null;
function createAccount(){
  const email=document.getElementById('ac-email').value.trim();
  const nat=natSel.value, natObj=NATIONS.find(x=>x.code===nat);
  const region=regionValue();
  const name=document.getElementById('ac-name').value.trim();
  const err=document.getElementById('ac-err');
  // 必須チェック（未入力は作成不可）
  if(!email||!nat||!region||!name){ err.textContent='⚠ すべての必須項目（*）を入力してください'; return; }
  if(!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)){ err.textContent='⚠ メールアドレスの形式が正しくありません'; return; }
  const id=gen8();
  _acct={id:id,email:email,nat:(natObj?natObj.flag+' '+natObj.name:nat),region:region,name:name,ts:new Date().toISOString()};
  try{ localStorage.setItem('ndm_account',JSON.stringify(_acct)); localStorage.setItem('ndm_player_id',id); }catch(e){}
  document.getElementById('ok-id').textContent=id;
  document.getElementById('ok-detail').innerHTML='希望名: <b style="color:#fff">'+name.replace(/[<>&]/g,'')+'</b><br>国籍: '+_acct.nat+'<br>地域: '+region.replace(/[<>&]/g,'');
  document.getElementById('form-card').style.display='none';
  document.getElementById('ok-card').style.display='block';
}
function mailRegister(){
  if(!_acct)return;
  const now=new Date(), wd=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][now.getDay()];
  const ts=(now.getMonth()+1)+'/'+now.getDate()+'/'+wd+'/'+String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0')+':'+String(now.getSeconds()).padStart(2,'0');
  const body='要件: アカウント本登録申請\n'
    +'プレイヤーID: '+_acct.id+'\n'
    +'希望プレイヤー名: '+_acct.name+'\n'
    +'メールアドレス: '+_acct.email+'\n'
    +'国籍: '+_acct.nat+'\n'
    +'都道府県・州/地域: '+_acct.region+'\n'
    +'送信日時: '+ts+'\n'
    +'※個人情報を悪用することは一切ございません。';
  location.href='mailto:'+encodeURIComponent(getAdminEmail())+'?subject='+encodeURIComponent('【NEON DATA MINING】アカウント本登録申請')+'&body='+encodeURIComponent(body);
}
</script>
</body>
</html>
